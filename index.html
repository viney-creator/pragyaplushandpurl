<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragya Plush & Purl</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand', 'Segoe UI', sans-serif;
}

body{
    background-color: #fcf8f6; /* Soft premium cream tone like Hookok */
    min-height:100vh;
    color: #4a4a4a;
}

header{
    background: #ffffff;
    text-align:center;
    padding:40px 20px;
    border-bottom: 1px solid #f0e6e2;
}

header h1{
    font-size: 2.5rem;
    font-weight: 800;
    color: #333;
    letter-spacing: -0.5px;
}

.tagline{
    margin-top:10px;
    font-size:1rem;
    color: #888;
    font-weight: 500;
}

.container{
    width:92%;
    max-width:1200px;
    margin:auto;
    padding:30px 15px;
}

.search-box{
    margin:20px auto 40px auto;
    max-width:500px;
}

.search-box input{
    width:100%;
    padding:14px 20px;
    border-radius: 8px; 
    font-size:15px;
    outline: none;
    border: 1px solid #ddd;
    transition: all 0.3s ease;
    background: #fff;
}

.search-box input:focus {
    border-color: #ff758c;
    box-shadow: 0 0 10px rgba(255, 117, 140, 0.1);
}

/* --- HOOKOK STYLE GRID --- */
.products{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 30px;
    margin-top:30px;
}

.card{
    background: #ffffff;
    border-radius: 0px; /* Clean rectangular cut like Hookok */
    overflow:hidden;
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
}

.card:hover{
    transform: translateY(-5px);
}

.card-img-wrapper {
    width: 100%;
    height: 280px;
    overflow: hidden;
    background-color: #f9f9f9;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition: transform 0.4s ease;
}

.card:hover img {
    transform: scale(1.03);
}

.card-content{
    padding: 15px 5px;
    text-align: left; /* Left align like professional craft blogs */
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.card h3{
    margin-bottom: 6px;
    color: #444;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
}

.price{
    font-size: 16px;
    font-weight: 700;
    color: #ff758c;
    margin-bottom: 12px;
}

.btn{
    background: #333;
    color: white;
    border: none;
    padding: 10px 14px;
    width: 100%;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: background 0.2s ease;
}

.btn:hover{
    background: #ff758c;
}

/* --- CART & FORM SECTION --- */
.cart {
    margin-top: 60px;
    background: #ffffff;
    padding: 30px;
    border-radius: 8px;
    border: 1px solid #eee;
}

.cart h2{
    color: #333;
    margin-bottom: 20px;
    font-size: 1.5rem;
    font-weight: 800;
}

.cart-item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 0;
    border-bottom: 1px solid #f5f5f5;
}

.qty-btn{
    padding: 4px 10px;
    margin: 0 3px;
    background: #f0f0f0;
    color: #333;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 700;
}

.qty-btn:hover {
    background: #ff758c;
    color: white;
}

.shipping-badge {
    background: #fff5f6;
    border: 1px dashed #ff758c;
    color: #ff758c;
    padding: 12px;
    border-radius: 6px;
    margin: 15px 0;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 700;
}

.total-breakdown {
    border-top: 1px solid #eee;
    padding-top: 15px;
    margin-top: 15px;
}

.breakdown-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 15px;
    color: #666;
}

.total{
    font-size: 22px;
    font-weight: 800;
    color: #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
}

.input-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 15px;
}

@media (max-width: 600px) {
    .input-group { grid-template-columns: 1fr; }
}

label {
    font-weight: 700; 
    font-size: 13px;
    color: #555;
    display: block;
    margin-bottom: 5px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    outline: none;
    font-size: 14px;
    transition: border-color 0.2s;
}

input:focus, textarea:focus {
    border-color: #ff758c;
}

.whatsapp{
    margin-top: 25px;
    background: #25D366;
    padding: 14px;
    font-size: 16px;
    border-radius: 6px;
}

.whatsapp:hover {
    background: #20ba5a;
}

footer {
    text-align: center;
    padding: 40px;
    margin-top: 60px;
    color: #bbb;
    font-size: 13px;
    border-top: 1px solid #f0e6e2;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>Pragya Plush & Purl</h1>
    <p class="tagline">Handmade Crochet Flowers, Plushies & Cute Crafts</p>
</header>

<div class="container">

    <div class="search-box">
        <input type="text" id="search" placeholder="Search unique crochet designs..." onkeyup="searchProducts()">
    </div>

    <div class="products" id="productList"></div>

    <div class="cart">
        <h2>Your Shopping Bag</h2>

        <div id="cartItems"></div>

        <div id="shippingBadge" class="shipping-badge" style="display: none;">
            <span id="shippingLocation">📍 Region: --</span>
            <span id="shippingFeeLabel">₹0</span>
        </div>

        <div class="total-breakdown">
            <div class="breakdown-row">
                <span>Items Subtotal:</span>
                <span>₹<span id="subtotal">0</span></span>
            </div>
            <div class="breakdown-row">
                <span>Delivery Charges:</span>
                <span>₹<span id="deliveryCharge">0</span></span>
            </div>
            <div class="total">
                <span>Total Amount:</span>
                <span>₹<span id="total">0</span></span>
            </div>
        </div>

        <div class="input-group">
            <div>
                <label>Your Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>
            <div>
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="10-digit mobile number">
            </div>
        </div>

        <div class="input-group">
            <div>
                <label>Pincode (6-Digits)</label>
                <input type="text" id="pincode" maxlength="6" placeholder="e.g. 110001" oninput="calculateShipping()">
                <span id="pinWarning" style="color:#ff758c; font-size:12px; font-weight:700; display:block; margin-top:4px;">⚠️ Enter a valid 6-digit Pincode to count shipping charges</span>
            </div>
            <div>
                <label>City / State Info</label>
                <input type="text" id="cityStateDisplay" placeholder="Autodetected via pincode..." readonly style="background:#f9f9f9; color:#777;">
            </div>
        </div>

        <div style="margin-top:15px;">
            <label>Full Delivery Address</label>
            <textarea id="address" rows="3" placeholder="House/Flat No, Building, Street, Landmark..."></textarea>
        </div>

        <button class="btn whatsapp" onclick="sendWhatsAppOrder()">
            Place Order via WhatsApp
        </button>
    </div>

</div>

<footer>
    &copy; 2026 Pragya Plush & Purl. Inspired by beautiful handmade loops.
</footer>

<script>
const whatsappNumber = "917800518854";

const products = [
    { id:1, name:"Blossom Bunny Plushie", price:150, image:"Blossom Bunny Plushie.jpg" },
    { id:2, name:"Cozy Teddy Crochet Baby Cap", price:999, image:"Cozy Teddy Crochet Baby Cap.jpg" },
    { id:3, name:"Golden Plushie", price:199, image:"Golden Plushie.jpg" },
    { id:4, name:"Sunny Duck Plushie", price:199, image:"Sunny Duck Plushie.jpg" },
    { id:5, name:"Teddy Crochet Baby Cap", price:999, image:"Teddy Crochet Baby Cap.jpg" },
    { id:6, name:"Candy Stripe Handmade Blanket", price:1999, image:"Candy Stripe Handmade Blanket.jpg" },
    { id:7, name:"Lavender Dreams Crochet Blanket", price:1999, image:"Lavender Dreams Crochet Blanket.jpg" },
    { id:8, name:"Hoppy Frog Plushie", price:199, image:"Hoppy Frog Plushie.jpg" }
];

let cart = [];
let deliveryFee = 0;
let detectedZone = "";

function renderProducts(list=products){
    let html='';
    list.forEach(product=>{
        html+=`
        <div class="card">
            <div class="card-img-wrapper">
                <img src="${product.image}">
            </div>
            <div class="card-content">
                <h3>${product.name}</h3>
                <div class="price">₹${product.price}</div>
                <button class="btn" onclick="addToCart(${product.id})">Add To Bag</button>
            </div>
        </div>
        `;
    });
    document.getElementById("productList").innerHTML=html;
}

function searchProducts(){
    const value = document.getElementById("search").value.toLowerCase();
    const filtered = products.filter(product => product.name.toLowerCase().includes(value));
    renderProducts(filtered);
}

function addToCart(id){
    let item=cart.find(x=>x.id===id);
    if(item){
        item.qty++;
    } else {
        const product=products.find(x=>x.id===id);
        cart.push({...product, qty:1});
    }
    renderCart();
}

function changeQty(id,change){
    let item=cart.find(x=>x.id===id);
    item.qty+=change;
    if(item.qty<=0){
        cart=cart.filter(x=>x.id!==id);
    }
    renderCart();
}

/* --- AUTOMATED PINCODE SHIPPING CALCULATION --- */
function calculateShipping() {
    const pincode = document.getElementById("pincode").value.trim();
    const cityStateInput = document.getElementById("cityStateDisplay");
    const badge = document.getElementById("shippingBadge");
    const locLabel = document.getElementById("shippingLocation");
    const feeLabel = document.getElementById("shippingFeeLabel");
    const pinWarning = document.getElementById("pinWarning");

    if (pincode.length < 6) {
        deliveryFee = 0;
        detectedZone = "";
        cityStateInput.value = "";
        badge.style.display = "none";
        pinWarning.style.display = "block";
        updateTotalOnly();
        return;
    }

    pinWarning.style.display = "none";
    const regionDigit = pincode.charAt(0);
    
    if (regionDigit === '1') {
        detectedZone = "Delhi, Haryana, Punjab & North Region";
        deliveryFee = 60;
    } else if (regionDigit === '2') {
        detectedZone = "Uttar Pradesh & Uttarakhand Zone";
        deliveryFee = 50;
    } else if (regionDigit === '3') {
        detectedZone = "Rajasthan & Gujarat Region";
        deliveryFee = 80;
    } else if (regionDigit === '4') {
        detectedZone = "Maharashtra, MP & Chhattisgarh Zone";
        deliveryFee = 90;
    } else if (regionDigit === '5' || regionDigit === '6') {
        detectedZone = "South India (KA, TN, KL, AP, TS)";
        deliveryFee = 120;
    } else if (regionDigit === '7') {
        detectedZone = "WB, Odisha & North East States";
        deliveryFee = 140;
    } else if (regionDigit === '8') {
        detectedZone = "Bihar & Jharkhand Region";
        deliveryFee = 90;
    } else {
        detectedZone = "Standard Domestic Cargo";
        deliveryFee = 100;
    }

    cityStateInput.value = detectedZone;
    locLabel.innerText = `📍 Region: ${detectedZone}`;
    feeLabel.innerText = `₹${deliveryFee}`;
    badge.style.display = "flex";

    updateTotalOnly();
}

function renderCart(){
    let html='';
    let subtotal=0;
    cart.forEach(item=>{
        subtotal+=item.price*item.qty;
        html+=`
        <div class="cart-item">
            <div>
                <strong>${item.name}</strong><br><span style="color:#888; font-size:13px;">₹${item.price}</span>
            </div>
            <div>
                <button class="qty-btn" onclick="changeQty(${item.id},-1)">-</button>
                <span style="font-weight:700; margin:0 4px;">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
            </div>
        </div>
        `;
    });
    document.getElementById("cartItems").innerHTML=html;
    document.getElementById("subtotal").innerText=subtotal;
    updateTotalOnly();
}

function updateTotalOnly() {
    let subtotal = parseInt(document.getElementById("subtotal").innerText) || 0;
    document.getElementById("deliveryCharge").innerText = deliveryFee;
    document.getElementById("total").innerText = subtotal + deliveryFee;
}

function sendWhatsAppOrder(){
    if(cart.length===0){
        alert("Your cart is empty! Add an item first.");
        return;
    }

    let name=document.getElementById("name").value.trim();
    let phone=document.getElementById("phone").value.trim();
    let pincode=document.getElementById("pincode").value.trim();
    let address=document.getElementById("address").value.trim();

    if(!name || !phone || !pincode || !address){
        alert("Please complete Name, Phone, Pincode, and Address fields!");
        return;
    }

    if(pincode.length !== 6) {
        alert("Please enter a valid 6-digit Pincode!");
        return;
    }

    let subtotal=0;
    let msg = "✨ *NEW ORDER - PRAGYA PLUSH & PURL* ✨\n\n";
    msg += "👤 *Customer Name:* " + name + "\n";
    msg += "📱 *Phone:* " + phone + "\n";
    msg += "📍 *Region Zone:* " + (detectedZone || "Verified") + "\n";
    msg += "📮 *Pincode:* " + pincode + "\n";
    msg += "🏠 *Address:* " + address + "\n\n";
    msg += "📦 *Items Ordered:* \n";

    cart.forEach(item=>{
        let itemCost = item.price * item.qty;
        subtotal += itemCost;
        msg += `• ${item.name} (x${item.qty}) = ₹${itemCost}\n`;
    });

    msg += `\n💵 *Items Subtotal:* ₹${subtotal}`;
    msg += `\n🚚 *Delivery Charges:* ₹${deliveryFee}`;
    msg += `\n💰 *Grand Total:* ₹${subtotal + deliveryFee}`;
    msg += `\n\nPlease accept and confirm my handmade order! 💕`;

    let finalLink = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;
    window.open(finalLink, "_blank");
}

renderProducts();
</script>

</body>
</html>
