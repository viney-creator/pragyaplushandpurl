<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragya Plush & Purl</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffe6f0,#fff0f6);
min-height:100vh;
}

header{
background:linear-gradient(90deg,#ff4da6,#ff85c2);
color:white;
text-align:center;
padding:25px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

header h1{
font-size:2rem;
}

.tagline{
margin-top:8px;
font-size:1rem;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:20px;
}

.search-box{
margin:20px auto;
max-width:600px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:30px;
font-size:16px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

.card h3{
margin-bottom:10px;
color:#ff4da6;
}

.price{
font-size:22px;
font-weight:bold;
color:#28a745;
margin-bottom:10px;
}

.btn{
background:#ff4da6;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#e60073;
}

.cart{
margin-top:30px;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.cart h2{
color:#ff4da6;
margin-bottom:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

.qty-btn{
padding:5px 10px;
margin:0 5px;
background:#ffb3d9;
border:none;
border-radius:5px;
cursor:pointer;
}

.total{
font-size:24px;
font-weight:bold;
color:green;
margin-top:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
}

.whatsapp{
margin-top:15px;
background:#25D366;
}

footer{
text-align:center;
padding:20px;
margin-top:20px;
color:#777;
}
</style>
</head>
<body>

<header>
<h1>🧸 Pragya Plush & Purl 🎀</h1>
<p class="tagline">
🐰 Handmade Plushies • 🐻 Crochet Toys • 🌸 Cute Gifts
</p>
</header>

<div class="container">

<div class="search-box">
<input
type="text"
id="search"
placeholder="🔍 Search Products..."
onkeyup="searchProducts()">
</div>

<div class="products" id="productList"></div>

<div class="cart">
<h2>🛒 Your Cart</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<input type="text" id="name" placeholder="👤 Your Name">

<input type="text" id="phone" placeholder="📱 Phone Number">

<textarea id="address" rows="3"
placeholder="📍 Delivery Address"></textarea>

<button class="btn whatsapp"
onclick="sendWhatsAppOrder()">
📲 Order on WhatsApp
</button>

</div>

</div>

<footer>
💖 Thank you for visiting Pragya Plush & Purl 💖
</footer>

<script>

const whatsappNumber = "917800518854";

const products = [

{
id:1,
name:"Blossom Bunny Plushie",
price:150,
image:"Blossom Bunny Plushie.jpg"
},

{
id:2,
name:"Cozy Teddy Crochet Baby Cap",
price:999,
image:"Cozy Teddy Crochet Baby Cap.jpg"
},

{
id:3,
name:"Golden Plushie",
price:199,
image:"Golden Plushie.jpg"
},

{
id:4,
name:"Sunny Duck Plushie",
price:199,
image:"Sunny Duck Plushie.jpg"
},

{
id:5,
name:"Teddy Crochet Baby Cap",
price:999,
image:"Teddy Crochet Baby Cap.jpg"
},

{
id:6,
name:"Candy Stripe Handmade Blanket",
price:1999,
image:"Candy Stripe Handmade Blanket.jpg"
},

{
id:7,
name:"Lavender Dreams Crochet Blanket",
price:1999,
image:"Lavender Dreams Crochet Blanket.jpg"
},

{
id:8,
name:"Hoppy Frog Plushie",
price:199,
image:"Hoppy Frog Plushie.jpg"
}

];

let cart=[];

function renderProducts(list=products){

let html='';

list.forEach(product=>{

html+=`
<div class="card">

<img src="${product.image}">

<div class="card-content">

<h3>${product.name}</h3>

<div class="price">
₹${product.price}
</div>

<button class="btn"
onclick="addToCart(${product.id})">
🛒 Add To Cart
</button>

</div>

</div>
`;
});

document.getElementById("productList").innerHTML=html;
}

function searchProducts(){

const value =
document.getElementById("Search")
.value.toLowerCase();

const filtered =
products.filter(product =>
product.name.toLowerCase()
.includes(value));

renderProducts(filtered);
}

function addToCart(id){

let item=cart.find(x=>x.id===id);

if(item){
item.qty++;
}
else{

const product=
products.find(x=>x.id===id);

cart.push({
...product,
qty:1
});
}

renderCart();
}

function changeQty(id,change){

let item=cart.find(x=>x.id===id);

item.qty+=change;

if(item.qty<=0){
cart=cart.filter(x=>x.id!==id);
}

renderCart();
}

function renderCart(){

let html='';
let total=0;

cart.forEach(item=>{

total+=item.price*item.qty;

html+=`
<div class="cart-item">

<div>
${item.name}
<br>
₹${item.price}
</div>

<div>

<button
class="qty-btn"
onclick="changeQty(${item.id},-1)">
-
</button>

${item.qty}

<button
class="qty-btn"
onclick="changeQty(${item.id},1)">
+
</button>

</div>

</div>
`;
});

document.getElementById("cartItems")
.innerHTML=html;

document.getElementById("total")
.innerText=total;
}

function sendWhatsAppOrder(){

if(cart.length===0){
alert("Cart is empty");
return;
}

let name=
document.getElementById("name").value;

let phone=
document.getElementById("phone").value;

let address=
document.getElementById("address").value;

let total=0;

let msg=
"🧸 *NEW ORDER - PRAGYA PLUSH & PURL*%0A%0A";

msg+="👤 Name: "+name+"%0A";
msg+="📱 Phone: "+phone+"%0A";
msg+="📍 Address: "+address+"%0A%0A";

msg+="🛒 *Products*%0A";

cart.forEach(item=>{

total+=item.price*item.qty;

msg+=`${item.name} x ${item.qty}
= ₹${item.price*item.qty}%0A`;

});

msg+=`%0A💰 Total: ₹${total}`;

window.open(
`https://wa.me/${whatsappNumber}?text=${msg}`,
"_blank"
);

}

renderProducts();

</script>

</body>
</html>
